[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -ra -q --tb=short
testpaths = tests
markers =
    api: API tests
    ui: UI tests
    e2e: E2E tests
    mobile: Mobile emulation tests (Pixel 5 / iPhone 13)
    desktop: Desktop browser tests
    integration: Integration tests (webhooks, event flow)